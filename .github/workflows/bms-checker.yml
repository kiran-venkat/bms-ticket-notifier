name: BMS Ticket Checker

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch: # Manual trigger button

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      # We completely removed the manual install step here!

      - name: Run checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKENS_EXTRA: ${{ secrets.TELEGRAM_BOT_TOKENS_EXTRA }}
          TELEGRAM_CHAT_IDS_EXTRA: ${{ secrets.TELEGRAM_CHAT_IDS_EXTRA }}
          BMS_URL: ${{ vars.BMS_URL }}
          BMS_DATES: ${{ vars.BMS_DATES }}
          BMS_THEATRE: ${{ vars.BMS_THEATRE }}
          BMS_TIME: ${{ vars.BMS_TIME }}
        # --with injects the dependencies directly into an isolated sandbox for main.py
        run: uv run --with requests --with curl_cffi main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bms_state.json
          git diff --cached --quiet || (git commit -m "chore: update bms_state.json [skip ci]" && git push)
